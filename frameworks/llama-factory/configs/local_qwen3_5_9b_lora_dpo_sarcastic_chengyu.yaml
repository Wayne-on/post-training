### model
model_name_or_path: /root/nfs/llm-models/Qwen3.5-9B
adapter_name_or_path: outputs/llamafactory/local-qwen3_5-9b/lora/sft_10k_3ep_messages
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all
pref_beta: 0.1
pref_loss: sigmoid
deepspeed: configs/deepspeed/zero2_bf16.json

### dataset
dataset_dir: frameworks/llama-factory/data
dataset: posttrain_dpo_sarcastic_chengyu
template: qwen3_nothink
cutoff_len: 2048
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: outputs/llamafactory/local-qwen3_5-9b/lora/dpo_sarcastic_chengyu_minimal_3ep
logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
