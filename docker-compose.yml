services:
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
      args:
        CUDA_IMAGE: ${TRAIN_CUDA_IMAGE:-nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04}
        TORCH_VERSION: ${TORCH_VERSION:-2.6.0}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.21.0}
        TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.6.0}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
    image: ${TRAIN_IMAGE:-post-training:cu124-train}
    shm_size: "64gb"
    ipc: host
    network_mode: host
    runtime: nvidia
    tty: true
    stdin_open: true
    working_dir: ${CONTAINER_WORKDIR:-/root/post-training}
    environment:
      PYTHONPATH: ${CONTAINER_WORKDIR:-/root/post-training}/src
      HF_HOME: ${HF_HOME:-/root/post-training/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/post-training/.cache/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      ROOT_PASS: ${ROOT_PASS:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NCCL_DEBUG: WARN
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ${PROJECT_DIR:-.}:${CONTAINER_WORKDIR:-/root/post-training}
      - ${NFS_MOUNT:-/data/test-files}:/root/nfs
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile.serve
      args:
        CUDA_IMAGE: ${SERVE_CUDA_IMAGE:-nvidia/cuda:12.4.1-cudnn-runtime-ubuntu22.04}
        TORCH_VERSION: ${TORCH_VERSION:-2.6.0}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.21.0}
        TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.6.0}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
    image: ${SERVE_IMAGE:-post-training:cu124-serve}
    shm_size: "16gb"
    ipc: host
    runtime: nvidia
    ports:
      - "${SERVE_HOST_PORT:-32001}:8000"
    working_dir: ${CONTAINER_WORKDIR:-/root/post-training}
    environment:
      PYTHONPATH: ${CONTAINER_WORKDIR:-/root/post-training}/src
      MODEL_ID: ${MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
      HF_HOME: ${HF_HOME:-/root/post-training/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/post-training/.cache/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ${PROJECT_DIR:-.}:${CONTAINER_WORKDIR:-/root/post-training}
    command: ["uvicorn", "post_training.serve_openai:app", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llamafactory:
    build:
      context: .
      dockerfile: docker/Dockerfile.llamafactory
      args:
        CUDA_IMAGE: ${TRAIN_CUDA_IMAGE:-nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04}
        TORCH_VERSION: ${TORCH_VERSION:-2.6.0}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.21.0}
        TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.6.0}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
        LLAMA_FACTORY_REF: ${LLAMA_FACTORY_REF:-v0.9.5}
    image: ${LLAMA_FACTORY_IMAGE:-post-training:llamafactory}
    container_name: ${LLAMA_FACTORY_CONTAINER_NAME:-posttrain_lf}
    shm_size: "${LLAMA_FACTORY_SHM_SIZE:-128gb}"
    ipc: host
    runtime: nvidia
    tty: true
    stdin_open: true
    working_dir: ${CONTAINER_WORKDIR:-/root/post-training}
    command: ["bash", "scripts/bootstrap_llamafactory_container.sh"]
    ports:
      - "${LLAMA_FACTORY_API_PORT:-32002}:8000"
      - "${LLAMA_FACTORY_TENSORBOARD_PORT:-32006}:6006"
      - "${LLAMA_FACTORY_WEBUI_PORT:-32060}:7860"
      - "${LLAMA_FACTORY_JUPYTER_PORT:-32080}:8888"
    environment:
      HF_HOME: ${HF_HOME:-/root/post-training/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/post-training/.cache/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      ROOT_PASS: ${ROOT_PASS:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NCCL_DEBUG: WARN
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ${PROJECT_DIR:-.}:${CONTAINER_WORKDIR:-/root/post-training}
      - ${NFS_MOUNT:-/data/test-files}:/root/nfs
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from torch.utils.tensorboard import SummaryWriter"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llamafactory-fa2:
    profiles: ["fa2"]
    build:
      context: .
      dockerfile: docker/Dockerfile.llamafactory-fa2
      args:
        LLAMA_FACTORY_BASE_IMAGE: ${LLAMA_FACTORY_IMAGE:-post-training:llamafactory}
        FLASH_ATTN_VERSION: ${FLASH_ATTN_VERSION:-2.7.4.post1}
        TRITON_VERSION: ${FA2_TRITON_VERSION:-3.2.0}
        FLA_VERSION: ${FLA_VERSION:-0.4.2}
        MAX_JOBS: ${FA2_MAX_JOBS:-4}
    image: ${LLAMA_FACTORY_FA2_IMAGE:-post-training:llamafactory-fa2}
    container_name: ${LLAMA_FACTORY_FA2_CONTAINER_NAME:-posttrain_lf_fa2}
    shm_size: "${LLAMA_FACTORY_SHM_SIZE:-128gb}"
    ipc: host
    runtime: nvidia
    tty: true
    stdin_open: true
    working_dir: ${CONTAINER_WORKDIR:-/root/post-training}
    command: ["bash", "scripts/bootstrap_llamafactory_fa2_container.sh"]
    ports:
      - "${LLAMA_FACTORY_FA2_API_PORT:-32102}:8000"
      - "${LLAMA_FACTORY_FA2_TENSORBOARD_PORT:-32106}:6006"
      - "${LLAMA_FACTORY_FA2_WEBUI_PORT:-32160}:7860"
      - "${LLAMA_FACTORY_FA2_JUPYTER_PORT:-32180}:8888"
    environment:
      HF_HOME: ${HF_HOME:-/root/post-training/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/post-training/.cache/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      ROOT_PASS: ${ROOT_PASS:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NCCL_DEBUG: WARN
      TOKENIZERS_PARALLELISM: "false"
      TORCH_COMPILE_DISABLE: "1"
      TORCHDYNAMO_DISABLE: "1"
    volumes:
      - ${PROJECT_DIR:-.}:${CONTAINER_WORKDIR:-/root/post-training}
      - ${NFS_MOUNT:-/data/test-files}:/root/nfs
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python", "scripts/verify_llamafactory_fa2.py"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  trl:
    profiles: ["trl"]
    build:
      context: .
      dockerfile: docker/Dockerfile.trl
      args:
        TRL_BASE_IMAGE: "${TRL_BASE_IMAGE:-${LLAMA_FACTORY_IMAGE:-post-training:llamafactory}}"
        TRL_VERSION: ${TRL_VERSION:-0.24.0}
        MERGEKIT_VERSION: ${MERGEKIT_VERSION:-0.1.4}
    image: ${TRL_IMAGE:-post-training:trl}
    container_name: ${TRL_CONTAINER_NAME:-posttrain_trl}
    shm_size: "${TRL_SHM_SIZE:-128gb}"
    ipc: host
    runtime: nvidia
    tty: true
    stdin_open: true
    working_dir: ${CONTAINER_WORKDIR:-/root/post-training}
    command: ["bash", "scripts/bootstrap_trl_container.sh"]
    ports:
      - "${TRL_TENSORBOARD_PORT:-32206}:6006"
      - "${TRL_JUPYTER_PORT:-32280}:8888"
    environment:
      PYTHONPATH: ${CONTAINER_WORKDIR:-/root/post-training}/src
      HF_HOME: ${HF_HOME:-/root/post-training/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/post-training/.cache/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      ROOT_PASS: ${ROOT_PASS:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NCCL_DEBUG: WARN
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ${PROJECT_DIR:-.}:${CONTAINER_WORKDIR:-/root/post-training}
      - ${NFS_MOUNT:-/data/test-files}:/root/nfs
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from trl import GRPOTrainer, GRPOConfig"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
